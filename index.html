<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevTool</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap"
        rel="stylesheet">
    <script src='https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js'></script>
</head>

<body>
    <div class="app-container">
        <!-- Sidebar Navigation -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2>&lt;Nous.<span class="highlight">Tool</span>/&gt;</h2>
            </div>
            <nav class="sidebar-nav" id="sidebarNav">
                <button class="nav-item active" data-tool="dashboard">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="3" width="7" height="7"></rect>
                        <rect x="14" y="3" width="7" height="7"></rect>
                        <rect x="14" y="14" width="7" height="7"></rect>
                        <rect x="3" y="14" width="7" height="7"></rect>
                    </svg>
                    Dashboard
                </button>

                <!-- JSON Tools -->
                <div class="nav-category">JSON</div>
                <button class="nav-item" data-tool="formatter">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M4 6h16M4 12h16m-7 6h7" />
                    </svg>
                    Formatter
                </button>
                <button class="nav-item" data-tool="converter">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path
                            d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3" />
                    </svg>
                    CSV &harr; JSON
                </button>

                <!-- Text Tools -->
                <div class="nav-category">Text</div>
                <button class="nav-item" data-tool="diff">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path
                            d="M14 3v4a1 1 0 0 0 1 1h4M17 21H7a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h7l5 5v11a2 2 0 0 1-2 2z" />
                        <line x1="9" y1="13" x2="15" y2="13" />
                        <line x1="12" y1="10" x2="12" y2="16" />
                    </svg>
                    Diff Checker
                </button>
                <button class="nav-item" data-tool="inspector">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M17 6.1L12.6 1L8 6.1V23h9V6.1z" />
                        <path d="M11 13h3" />
                        <path d="M11 17h3" />
                    </svg>
                    Character Counter
                </button>
                <button class="nav-item" data-tool="notes">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7" />
                        <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z" />
                    </svg>
                    Notes
                </button>

                <!-- Codec Tools -->
                <div class="nav-category">Codec</div>
                <button class="nav-item" data-tool="jwt">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" />
                        <path d="M12 8v4" />
                        <path d="M12 16h.01" />
                    </svg>
                    JWT Decoder
                </button>
                <button class="nav-item" data-tool="base64">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M4 7h16M4 12h16M4 17h16" />
                    </svg>
                    Base64 Codec
                </button>

                <!-- Network Tools -->
                <div class="nav-category">Network</div>
                <button class="nav-item" data-tool="network">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="10" />
                        <path
                            d="M2 12h20M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z" />
                    </svg>
                    Network IP
                </button>

                <!-- Time Tools -->
                <div class="nav-category">Time</div>
                <button class="nav-item" data-tool="time">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="10" />
                        <polyline points="12 6 12 12 16 14" />
                    </svg>
                    Unix Time
                </button>
                <button class="nav-item" data-tool="cron">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="10" />
                        <path d="M12 6v6l4 2" />
                    </svg>
                    Cron Parser
                </button>

                <!-- Generator Tools -->
                <div class="nav-category">Generator</div>
                <button class="nav-item" data-tool="uuid">
                    <svg viewBox="0 0 24 24" fill="none" class="swap-icon" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="11" width="18" height="11" rx="2" ry="2" />
                        <path d="M7 11V7a5 5 0 0 1 10 0v4" />
                    </svg>
                    UUID Generator
                </button>
                <button class="nav-item" data-tool="password">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path
                            d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4" />
                    </svg>
                    Password Generator
                </button>

                <!-- Converter Tools -->
                <div class="nav-category">Converter</div>
                <button class="nav-item" data-tool="ocr">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path
                            d="M7 2H4a2 2 0 0 0-2 2v3m18 0V4a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 17v3a2 2 0 0 0 2 2h3" />
                        <line x1="7" y1="12" x2="17" y2="12" />
                    </svg>
                    Image to Text
                </button>
                <button class="nav-item" data-tool="imagetopdf">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
                        <polyline points="14 2 14 8 20 8" />
                        <rect x="3" y="11" width="7" height="7" rx="1" />
                        <circle cx="5" cy="13" r="0.5" fill="currentColor" stroke="none" />
                        <polyline points="3 17 5 15 7 17" />
                    </svg>
                    Image to PDF
                </button>

                <!-- Productivity Tools -->
            </nav>
        </aside>

        <!-- Main Content Area -->
        <main class="main-content">
            <header class="top-bar">
                <h1 id="currentToolTitle">JSON Formatter</h1>
                <div class="top-actions">
                    <button id="themeToggle" class="theme-toggle" type="button" aria-pressed="false">
                        <span class="theme-toggle-track" aria-hidden="true">
                            <span class="theme-toggle-thumb"></span>
                        </span>
                        <span class="theme-toggle-label">Dark</span>
                    </button>
                    <div id="topActions"></div>
                </div>
            </header>

            <div class="workspace" id="workspace">
                <!-- Tool content injected here -->
            </div>
        </main>
    </div>

    <!-- Command Palette -->
    <div id="commandPaletteOverlay" class="command-palette-overlay">
        <div class="command-palette">
            <div class="command-search-input-wrapper">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="11" cy="11" r="8"></circle>
                    <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                </svg>
                <input type="text" id="commandSearchInput" class="command-search-input"
                    placeholder="Search tools and features..." autocomplete="off" style="border: none;">
            </div>
            <div id="commandResults" class="command-results">
                <!-- Search results will be injected here -->
            </div>
            <div class="command-palette-footer">
                <div class="command-hint">
                    <span class="command-key">↑↓</span> Navigate
                </div>
                <div class="command-hint">
                    <span class="command-key">↵</span> Select
                </div>
                <div class="command-hint">
                    <span class="command-key">esc</span> Close
                </div>
            </div>
        </div>
    </div>

    <!-- Global Toast Container -->
    <div id="toastContainer" class="toast-container"></div>

    <!-- Application Script -->
    <script type="module" src="js/main.js"></script>
</body>

</html>
