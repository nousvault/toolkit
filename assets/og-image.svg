<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#0e1512"/>
  
  <!-- Accent line top -->
  <rect x="0" y="0" width="1200" height="4" fill="#00d4a0"/>
  
  <!-- Logo mark -->
  <g transform="translate(80, 80)">
    <circle cx="36" cy="36" r="32" fill="none" stroke="#00d4a0" stroke-width="3"/>
    <circle cx="36" cy="36" r="12" fill="#00d4a0"/>
    <line x1="36" y1="4" x2="36" y2="24" stroke="#00d4a0" stroke-width="2.5"/>
    <line x1="36" y1="60" x2="26" y2="52" stroke="#00d4a0" stroke-width="2"/>
    <line x1="36" y1="60" x2="46" y2="52" stroke="#00d4a0" stroke-width="2"/>
  </g>
  
  <!-- Title -->
  <text x="80" y="280" font-family="'Georgia', 'Times New Roman', serif" font-size="96" font-weight="bold" fill="#f4efe6" letter-spacing="-1">Tools</text>
  <text x="80" y="340" font-family="'Georgia', 'Times New Roman', serif" font-size="36" fill="#00d4a0" font-style="italic">by NousVault</text>
  
  <!-- Tagline -->
  <text x="80" y="430" font-family="'Inter', 'SF Pro', -apple-system, system-ui, sans-serif" font-size="26" fill="#f4efe6" opacity="0.7">JSON, diff, JWT, UUID — free developer utilities, no account required.</text>
  
  <!-- Site URL -->
  <text x="80" y="540" font-family="'Inter', 'SF Pro', -apple-system, system-ui, sans-serif" font-size="20" fill="#00d4a0" letter-spacing="2">tool.nous.my.id</text>
  
  <!-- Accent line bottom -->
  <rect x="0" y="626" width="1200" height="4" fill="#00d4a0"/>
</svg>